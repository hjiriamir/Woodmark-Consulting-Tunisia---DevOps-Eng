version: "3.9"

services:

  jenkins:
    build:
      context: ./jenkins

    container_name: jenkins

    restart: unless-stopped

    privileged: true

    user: root

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"

volumes:
  jenkins_home: